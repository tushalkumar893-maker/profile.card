<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Premium Dashboard | Profile</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #0071e3;
            --accent: #5ac8fa;
            --bg-dark: #000000;
            --glass: rgba(20, 20, 20, 0.7);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        /* --- PRE-LOADER / INTRO --- */
        #intro-loader {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: 1s ease-in-out;
        }
        .apple-logo {
            font-size: 50px;
            color: white;
            animation: logoPulse 2s infinite ease-in-out;
        }
        @keyframes logoPulse {
            0%, 100% { opacity: 0.3; transform: scale(0.9); filter: blur(2px); }
            50% { opacity: 1; transform: scale(1.1); filter: blur(0); }
        }
        .loading-bar {
            width: 150px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
        }
        .loading-bar::after {
            content: '';
            display: block;
            width: 0%;
            height: 100%;
            background: var(--primary);
            animation: fillBar 2s forwards;
        }
        @keyframes fillBar { to { width: 100%; } }

        /* --- DYNAMIC BACKGROUND --- */
        body {
            background-color: var(--bg-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            perspective: 1500px;
        }
        .bg-animate {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
        }
        /* Moving Orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: move 20s infinite alternate;
        }
        .orb-1 { width: 400px; height: 400px; background: #0071e3; top: -10%; left: -10%; }
        .orb-2 { width: 300px; height: 300px; background: #ff0055; bottom: -5%; right: -5%; animation-delay: -5s; }
        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 150px); }
        }

        /* --- THE PREMIUM CARD --- */
        .card-wrapper {
            opacity: 0;
            transform: scale(0.8) translateY(50px);
            transition: 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .card-wrapper.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .card {
            width: 420px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            border-radius: 40px;
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
        }

        /* Cover Image Section */
        .cover-area {
            height: 180px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        .cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 1s;
        }
        .card:hover .cover-img { transform: scale(1.1); }
        
        .overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, transparent, var(--glass));
        }

        /* Profile Image (Squircle Apple Shape) */
        .profile-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: -70px auto 0;
            z-index: 10;
        }
        .profile-img {
            width: 100%;
            height: 100%;
            /* Apple Icon Shape (Squircle) */
            border-radius: 35px; 
            object-fit: cover;
            border: 6px solid #1a1a1c;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #111;
        }
        /* Border Glow Animation */
        .profile-container::before {
            content: '';
            position: absolute;
            inset: -4px;
            background: linear-gradient(45deg, #0071e3, #5ac8fa, #00ffcc);
            border-radius: 38px;
            z-index: -1;
            animation: rotateGlow 4s linear infinite;
        }
        @keyframes rotateGlow { 
            0% { filter: hue-rotate(0deg); } 
            100% { filter: hue-rotate(360deg); } 
        }

        /* Content Section */
        .main-content {
            padding: 25px 35px 35px;
            text-align: center;
            color: white;
        }
        .name { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
        .tagline { color: var(--accent); font-size: 14px; margin: 5px 0 15px; font-weight: 500; }
        .bio { font-size: 14px; color: #a1a1a6; line-height: 1.6; margin-bottom: 25px; }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 15px 5px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .stat-card:hover { background: rgba(255,255,255,0.1); transform: translateY(-5px); }
        .stat-value { font-size: 18px; font-weight: 700; display: block; }
        .stat-label { font-size: 10px; color: #86868b; text-transform: uppercase; letter-spacing: 1px; }

        /* Actions */
        .buttons { display: flex; gap: 15px; }
        .btn {
            flex: 1;
            padding: 14px;
            border-radius: 18px;
            border: none;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary { 
            background: var(--primary); color: white; 
            box-shadow: 0 10px 20px rgba(0, 113, 227, 0.3);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(0, 113, 227, 0.5); }
        
        .btn-glass { 
            background: rgba(255,255,255,0.1); color: white; 
            backdrop-filter: blur(10px);
        }
        .btn-glass:hover { background: rgba(255,255,255,0.2); }

        /* Floating Social Icons */
        .socials {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 25px;
        }
        .socials i {
            font-size: 20px;
            color: #86868b;
            transition: 0.3s;
            cursor: pointer;
        }
        .socials i:hover { color: white; transform: scale(1.2); }

    </style>
</head>
<body>

    <!-- Intro Loader -->
    <div id="intro-loader">
        <i class="fab fa-apple apple-logo"></i>
        <div class="loading-bar"></div>
    </div>

    <!-- Animated Background -->
    <div class="bg-animate">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Card Wrapper for 3D Tilt -->
    <div class="card-wrapper" id="cardContainer">
        <div class="card" id="tiltCard">
            <!-- Cover Photo (Premium Abstract) -->
            <div class="cover-area">
                <img src="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?auto=format&fit=crop&q=80&w=1200" alt="Cover" class="cover-img">
                <div class="overlay"></div>
            </div>

            <!-- Profile Pic (YOUR PHOTO) -->
            <div class="profile-container">
                <img src="pic.jpg" alt="Profile" class="profile-img">
            </div>

            <!-- Content -->
            <div class="main-content">
                <h1 class="name">Creative Master</h1>
                <p class="tagline">Tushal kumar | Full Stack Architect</p>
                <p class="bio">Passionate about building pixel perfect interfaces and seamless digital experiences with a modern touch.</p>

                <!-- Animated Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-value" data-target="200">0</span>
                         <span class="stat-value-suffix">+</span>
                        <span class="stat-label">Projects</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value" data-target="25.8">0</span>
                        <span class="stat-value-suffix">M</span>
                        <span class="stat-label">Followers</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value" data-target="99">0</span>
                        <span class="stat-value-suffix">%</span>
                        <span class="stat-label">Success</span>
                    </div>
                </div>

                <div class="buttons">
                    <button class="btn btn-primary">Connect</button>
                    <button class="btn btn-glass">Portfolio</button>
                </div>

                <div class="socials">
                    <i class="fab fa-instagram"></i>
                    <i class="fab fa-github"></i>
                    <i class="fab fa-twitter"></i>
                    <i class="fab fa-dribbble"></i>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 1. Intro Loader Logic
        window.addEventListener('load', () => {
            const loader = document.getElementById('intro-loader');
            const wrapper = document.getElementById('cardContainer');
            
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    wrapper.classList.add('visible');
                    animateNumbers(); // Start stats animation
                }, 1000);
            }, 2500); // Intro length
        });

        // 2. 3D Tilt Animation Logic
        const card = document.getElementById('tiltCard');
        const container = document.getElementById('cardContainer');

        container.addEventListener('mousemove', (e) => {
            let xAxis = (window.innerWidth / 2 - e.pageX) / 20;
            let yAxis = (window.innerHeight / 2 - e.pageY) / 20;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        container.addEventListener('mouseenter', () => {
            card.style.transition = "none";
        });

        container.addEventListener('mouseleave', () => {
            card.style.transition = "0.5s ease";
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        // 3. Counting Numbers Animation
        function animateNumbers() {
            const counters = document.querySelectorAll('.stat-value');
            counters.forEach(counter => {
                const target = +counter.getAttribute('data-target');
                let count = 0;
                const updateCount = () => {
                    const increment = target / 50;
                    if (count < target) {
                        count += increment;
                        counter.innerText = Math.ceil(count);
                        setTimeout(updateCount, 30);
                    } else {
                        counter.innerText = target;
                    }
                };
                updateCount();
            });
        }
    </script>
</body>
</html>
